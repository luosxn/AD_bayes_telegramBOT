version: '3.8'

services:
  spam-bot:
    build: .
    container_name: telegram-spam-bot
    restart: unless-stopped
    
    # 环境变量
    environment:
      # 必填：从 @BotFather 获取的 Bot Token
      - BOT_TOKEN=${BOT_TOKEN}
      
      # 可选：数据库URL（默认SQLite）
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/spam_bot.db}
      
      # 可选：垃圾消息判定阈值（默认0.95）
      - SPAM_THRESHOLD=${SPAM_THRESHOLD:-0.95}
      
      # 可选：连续违规次数限制（默认3）
      - MAX_VIOLATIONS=${MAX_VIOLATIONS:-3}
      
      # 可选：日志级别（默认INFO）
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    # 数据持久化
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
